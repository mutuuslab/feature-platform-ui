<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feature Platform — Lifecycle Governance (Mock-UI)</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Stale-cache 워치독: 번들 해시 밖 인라인. 앱이 6초 내 마운트 안 되면(=옛 캐시로 번들 로드 실패)
         캐시 무력화 쿼리로 1회만 자동 새로고침. sessionStorage 가드로 무한루프 방지. -->
    <script>
      (function () {
        var KEY = "fp-stale-reload";
        function mounted() {
          var r = document.getElementById("root");
          return !!(r && r.children.length > 0);
        }
        window.addEventListener("load", function () {
          setTimeout(function () {
            if (mounted()) {
              try { sessionStorage.removeItem(KEY); } catch (e) {}
              return;
            }
            try {
              if (sessionStorage.getItem(KEY)) return; // 이미 1회 시도 → 루프 방지
              sessionStorage.setItem(KEY, "1");
            } catch (e) {}
            location.replace(location.pathname + "?r=" + Date.now() + location.hash);
          }, 6000);
        });
      })();
    </script>
  </body>
</html>
