# 오픈소스(OSS) Unleash 자체 호스팅 — github.com/Unleash/unleash
# 실행:  docker compose -f docker-compose.unleash.yml up -d
# 그 다음:  bash unleash-init.sh   (dev/qa/prod 환경 생성·활성화)
# 운영자는 Unleash 콘솔을 직접 쓰지 않으며, 플랫폼 백엔드(/api/flags)만 Admin API로 flag를 관리합니다(headless).
services:
  unleash:
    image: unleashorg/unleash-server:latest
    ports:
      - "4242:4242"
    environment:
      DATABASE_URL: "postgres://unleash:unleash@db:5432/unleash"
      DATABASE_SSL: "false"
      # 데모용 부트스트랩 Admin API 토큰(알려진 값). 운영 시 반드시 교체.
      INIT_ADMIN_API_TOKENS: "*:*.unleash-insecure-admin-api-token"
      # 데모 콘솔 로그인(선택) — 운영자는 콘솔 미사용이 원칙
      INIT_FRONTEND_API_TOKENS: "default:development.unleash-insecure-frontend-api-token"
      LOG_LEVEL: "warn"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4242/health"]
      interval: 5s
      timeout: 5s
      retries: 20

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: unleash
      POSTGRES_PASSWORD: unleash
      POSTGRES_DB: unleash
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unleash"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - unleash_pgdata:/var/lib/postgresql/data

volumes:
  unleash_pgdata:
